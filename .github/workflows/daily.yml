name: Daily Academic Update

on:
  schedule:
    - cron: '0 5 * * *'   # يوميًا
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-daily-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run script
        run: python scripts/daily_update.py

      - name: Commit & push results
        run: |
          git config --global user.name "AnasAlmala"
          git config --global user.email "anas@example.com"
          git add .
          git commit -m "Daily update" || echo "No changes"
          git push
