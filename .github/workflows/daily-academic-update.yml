name: Daily Academic Update

on:
  schedule:
    # 05:00 UTC = 08:00 Asia/Riyadh
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate daily dashboard
        run: bash scripts/daily_update.sh

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/daily/latest.md docs/daily/dashboard_*.md || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: daily academic dashboard $(date -u +%F)"
          git push
